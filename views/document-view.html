<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Document Viewer</title>
    <link rel="stylesheet" href="../css/dashboard.css" />
    <style>
      .doc-container {
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
        background: #fff;
        border-radius: 10px;
        border: 1px solid #eef2f7;
      }
      .doc-meta {
        color: #6b7280;
        margin-bottom: 12px;
      }
      .doc-title {
        font-size: 20px;
        color: #0f172a;
        margin-bottom: 8px;
      }
      .open-link {
        display: inline-block;
        margin-top: 12px;
        padding: 8px 14px;
        background: #7c3aed;
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="doc-container">
      <div id="doc-content">
        <div class="doc-meta">Loading…</div>
      </div>
    </div>

    <script>
      async function fetchData() {
        try {
          const res = await fetch("../data/documents.json");
          return await res.json();
        } catch (e) {
          console.error(e);
          return [];
        }
      }

      function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      (async function () {
        const id = getQueryParam("id");
        const data = await fetchData();
        const doc = data.find((d) => d.id === id);
        const container = document.getElementById("doc-content");
        if (!doc) {
          container.innerHTML = "<p>Document not found.</p>";
          return;
        }

        const signedAt = doc.signedAt
          ? new Date(doc.signedAt).toLocaleString()
          : "—";

        const embed = doc.file
          ? `<div style="margin-top:18px"> <iframe src="${doc.file}" style="width:100%;height:640px;border:0;border-radius:8px"></iframe> </div>`
          : `<div style="margin-top:18px;color:#374151">No file available for preview.</div>`;

        container.innerHTML = `
          <div class="doc-title">${doc.title}</div>
          <div class="doc-meta">${doc.docNumber} · ${doc.category} · ${doc.department}</div>
          <div class="doc-meta">Status: ${doc.status} · Priority: ${doc.priority} · Uploaded: ${new Date(doc.uploadedAt).toLocaleString()}</div>
          ${embed}
          <a class="open-link" href="${doc.file || doc.url}" target="_blank" rel="noopener">Open in new tab</a>
        `;
      })();
    </script>
  </body>
</html>
